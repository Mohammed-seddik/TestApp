<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
</head>
<body>
  <p>Redirecting to authentication callback...</p>
  <script>
    (function () {
      //^ App-level wrapper forwards to integration-owned callback implementation.
      const query = window.location.search || "";
      const hash = window.location.hash || "";
      window.location.replace("/keycloak/callback.html" + query + hash);
    })();
  </script>
</body>
</html>
